name: rating service ci

on:
  push:
    branches: ["**"]
    paths:
      - "rating/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/rating-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["**"]
    paths:
      - "rating/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/rating-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  # ============================================================================
  # PHASE 1: TEST - Run unit tests, code quality checks, security analysis
  # ============================================================================
  Test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK environment
        uses: ./.github/workflows/actions

      # Chỉ chạy test cho rating và các module phụ thuộc cần thiết.
      # Dùng pha `test` để tránh bị chặn bởi jacoco:check của common-library.
      - name: Run Maven Tests
        run: mvn test -pl rating -am --batch-mode --no-transfer-progress
      # Checkstyle vẫn cần resolve dependency common-library cho module rating.
      # Vì bước trên không `install` artifact vào local Maven repo, nên ở đây
      # chạy thêm `package -pl rating -am` để Maven dựng đủ reactor trong cùng lần chạy.
      # Đồng thời skip test và skip jacoco để không bị fail ngoài phạm vi rating.
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn package checkstyle:checkstyle -pl rating -am -DskipTests -Djacoco.skip=true --batch-mode --no-transfer-progress -Dcheckstyle.output.file=rating-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "**/rating-checkstyle-result.xml"
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) && hashFiles('rating/**/target/surefire-reports/TEST-*.xml', 'rating/**/target/failsafe-reports/TEST-*.xml') != '' }}
        with:
          name: Rating-Service-Unit-Test-Results
          path: "rating/**/*-reports/TEST*.xml"
          reporter: java-junit

      - name: Upload JUnit Test Results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: rating-junit-test-results
          path: |
            rating/**/target/surefire-reports/TEST-*.xml
            rating/**/target/failsafe-reports/TEST-*.xml
          if-no-files-found: warn
          retention-days: 14
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Sonar cũng cần module rating được build cùng các dependency nội bộ như common-library.
        # Chạy `package -pl rating -am` để chuẩn bị class/artifact cho phân tích,
        # nhưng không chạy lại test và không bật jacoco check.
        run: mvn package org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -pl rating -am -DskipTests -Djacoco.skip=true --batch-mode --no-transfer-progress
      - name: OWASP Dependency Check
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: "yas"
          path: "."
          format: "HTML"
          args: --disableCentral
      - name: Upload OWASP Dependency Check results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports
          if-no-files-found: warn
          retention-days: 14
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' && hashFiles('rating/target/site/jacoco/jacoco.xml') != '' }}
        with:
          paths: ${{github.workspace}}/rating/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: "Rating Coverage Report"
          update-comment: true

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: rating-jacoco-coverage-report
          path: |
            rating/target/site/jacoco/jacoco.xml
            rating/target/site/jacoco-it/jacoco.xml
            rating/target/site/jacoco/index.html
            rating/target/site/jacoco-it/index.html
          if-no-files-found: warn
          retention-days: 14

  # ============================================================================
  # PHASE 2: BUILD - Build Docker image and push to registry
  # ============================================================================
  Build:
    needs: Test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK environment
        uses: ./.github/workflows/actions

      - name: Build application (generate /target)
        run: mvn clean package -pl rating -am -DskipTests

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: ./rating
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/yas-rating:latest
