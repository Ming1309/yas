name: backoffice service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-ci.yaml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-ci.yaml"
  workflow_dispatch:

jobs:
  # ============================================================================
  # PHASE 1: TEST - Run linting, prettier, security checks, SonarCloud analysis
  # ============================================================================
  Test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      security-events: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm ci
        working-directory: backoffice
      
      - name: Build application
        run: npm run build
        working-directory: backoffice
      
      - name: Run linting
        run: npm run lint
        working-directory: backoffice
      
      - name: Run Prettier check
        run: npx prettier --check .
        working-directory: backoffice
      
      - name: Audit dependencies
        run: npm audit --omit=dev
        continue-on-error: true
        working-directory: backoffice
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.24.0
        with:
          scan-type: 'fs'
          scan-ref: './backoffice'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: SonarCloud Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: backoffice
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ============================================================================
  # PHASE 2: BUILD - Build Docker image and push to registry
  # ============================================================================
  Build:
    needs: Test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/yas-backoffice:latest
