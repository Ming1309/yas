        run: echo "Running CI for storefront-bff"

  ci-tax:
    needs: changes
    if: needs.changes.outputs.tax == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for tax
        run: echo "Running CI for tax"

  ci-webhook:
    needs: changes
    if: needs.changes.outputs.webhook == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for webhook
        run: echo "Running CI for webhook"

  # Frontend Services
  ci-backoffice:
    needs: changes
    if: needs.changes.outputs.backoffice == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for backoffice
        run: echo "Running CI for backoffice"

  ci-storefront:
    needs: changes
    if: needs.changes.outputs.storefront == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for storefront
        run: echo "Running CI for storefront"

  # Shared Libraries and Test Automation
  ci-automation-ui:
    needs: changes
    if: needs.changes.outputs.automation-ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for automation-ui
        run: echo "Running CI for automation-ui"

  ci-common-library:
    needs: changes
    if: needs.changes.outputs.common-library == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for common-library
        run: echo "Running CI for common-library"

  # Infrastructure & Configuration
  ci-deployment:
    needs: changes
    if: needs.changes.outputs.deployment == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for deployment
        run: echo "Running CI for deployment"

  ci-kafka:
    needs: changes
    if: needs.changes.outputs.kafka == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for kafka
        run: echo "Running CI for kafka"

  ci-nginx:
