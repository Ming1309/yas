name: CI - Path Filter Based

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backoffice-bff: ${{ steps.changes.outputs.backoffice-bff }}
      backoffice: ${{ steps.changes.outputs.backoffice }}
      cart: ${{ steps.changes.outputs.cart }}
      customer: ${{ steps.changes.outputs.customer }}
      delivery: ${{ steps.changes.outputs.delivery }}
      inventory: ${{ steps.changes.outputs.inventory }}
      location: ${{ steps.changes.outputs.location }}
      media: ${{ steps.changes.outputs.media }}
      order: ${{ steps.changes.outputs.order }}
      payment: ${{ steps.changes.outputs.payment }}
      payment-paypal: ${{ steps.changes.outputs.payment-paypal }}
      product: ${{ steps.changes.outputs.product }}
      promotion: ${{ steps.changes.outputs.promotion }}
      rating: ${{ steps.changes.outputs.rating }}
      recommendation: ${{ steps.changes.outputs.recommendation }}
      search: ${{ steps.changes.outputs.search }}
      sampledata: ${{ steps.changes.outputs.sampledata }}
      storefront: ${{ steps.changes.outputs.storefront }}
      storefront-bff: ${{ steps.changes.outputs.storefront-bff }}
      tax: ${{ steps.changes.outputs.tax }}
      webhook: ${{ steps.changes.outputs.webhook }}
      automation-ui: ${{ steps.changes.outputs.automation-ui }}
      common-library: ${{ steps.changes.outputs.common-library }}
      deployment: ${{ steps.changes.outputs.deployment }}
      kafka: ${{ steps.changes.outputs.kafka }}
      nginx: ${{ steps.changes.outputs.nginx }}
      scripts: ${{ steps.changes.outputs.scripts }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for path changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backoffice-bff:
              - 'backoffice-bff/**'
            backoffice:
              - 'backoffice/**'
            cart:
              - 'cart/**'
            customer:
              - 'customer/**'
            delivery:
              - 'delivery/**'
            inventory:
              - 'inventory/**'
            location:
              - 'location/**'
            media:
              - 'media/**'
            order:
              - 'order/**'
            payment:
              - 'payment/**'
            payment-paypal:
              - 'payment-paypal/**'
            product:
              - 'product/**'
            promotion:
              - 'promotion/**'
            rating:
              - 'rating/**'
            recommendation:
              - 'recommendation/**'
            search:
              - 'search/**'
            sampledata:
              - 'sampledata/**'
            storefront:
              - 'storefront/**'
            storefront-bff:
              - 'storefront-bff/**'
            tax:
              - 'tax/**'
            webhook:
              - 'webhook/**'
            automation-ui:
              - 'automation-ui/**'
            common-library:
              - 'common-library/**'
            deployment:
              - 'deployment/**'
            kafka:
              - 'kafka/**'
            nginx:
              - 'nginx/**'
            scripts:
              - 'scripts/**'

  # Backend Services
  ci-backoffice-bff:
    needs: changes
    if: needs.changes.outputs.backoffice-bff == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for backoffice-bff
        run: echo "Running CI for backoffice-bff"

  ci-cart:
    needs: changes
    if: needs.changes.outputs.cart == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for cart
        run: echo "Running CI for cart"

  ci-customer:
    needs: changes
    if: needs.changes.outputs.customer == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for customer
        run: echo "Running CI for customer"

  ci-delivery:
    needs: changes
    if: needs.changes.outputs.delivery == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for delivery
        run: echo "Running CI for delivery"

  ci-inventory:
    needs: changes
    if: needs.changes.outputs.inventory == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for inventory
        run: echo "Running CI for inventory"

  ci-location:
    needs: changes
    if: needs.changes.outputs.location == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for location
        run: echo "Running CI for location"

  ci-media:
    needs: changes
    if: needs.changes.outputs.media == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for media
        run: echo "Running CI for media"

  ci-order:
    needs: changes
    if: needs.changes.outputs.order == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for order
        run: echo "Running CI for order"

  ci-payment:
    needs: changes
    if: needs.changes.outputs.payment == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for payment
