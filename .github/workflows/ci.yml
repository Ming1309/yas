    runs-on: ubuntu-latest
    steps:
      - name: Running CI for promotion
        run: echo "Running CI for promotion"

  ci-rating:
    needs: changes
    if: needs.changes.outputs.rating == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for rating
        run: echo "Running CI for rating"

  ci-recommendation:
    needs: changes
    if: needs.changes.outputs.recommendation == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for recommendation
        run: echo "Running CI for recommendation"

  ci-search:
    needs: changes
    if: needs.changes.outputs.search == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Running CI for search
        run: echo "Running CI for search"

  ci-sampledata:
