name: Snyk Security Scan

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Tên service (e.g., order, cart, backoffice)"
      build-tool:
        required: true
        type: string
        description: "'maven' hoặc 'node'"
    secrets:
      SNYK_TOKEN:
        required: true

permissions:
  contents: read
  security-events: write

jobs:
  snyk-scan:
    name: Snyk Scan – ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    # ── Gán inputs vào env ở job level để tránh script injection ─────────
    env:
      SERVICE_NAME: ${{ inputs.service-name }}
      BUILD_TOOL: ${{ inputs.build-tool }}
    steps:
      - uses: actions/checkout@v4

      # ── Setup Maven (Java services) ──────────────────────────────────────
      - name: Set up JDK 25
        if: ${{ inputs.build-tool == 'maven' }}
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      # Dùng -pl + -am (also-make) để Maven tự resolve thứ tự build đúng
      # Giống hệt cách cart-ci.yaml build: "mvn clean install -pl cart -am"
      - name: Install service and dependencies
        if: ${{ inputs.build-tool == 'maven' }}
        run: |
          mvn install \
            --projects "$SERVICE_NAME" \
            --also-make \
            --batch-mode \
            -DskipTests \
            -q

      # ── Setup Node (Frontend services) ───────────────────────────────────
      - name: Set up Node.js 20
        if: ${{ inputs.build-tool == 'node' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        if: ${{ inputs.build-tool == 'node' }}
        run: npm ci --ignore-scripts
        working-directory: ${{ inputs.service-name }}

      # ── Install Snyk CLI ──────────────────────────────────────────────────
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      # ── Pre-create valid placeholder SARIF (GitHub API yêu cầu ít nhất 1 run) ──
      - name: Initialize SARIF file
        run: |
          EMPTY_SARIF='{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk","rules":[]}},"results":[]}]}'
          echo "$EMPTY_SARIF" > snyk-sca.sarif

      # ── Snyk Open Source (SCA – dependency scan) ─────────────────────────
      - name: Snyk Open Source Test
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          # Truyền revision cho Maven subprocess mà Snyk CLI spawn
          MAVEN_OPTS: -Drevision=1.0-SNAPSHOT
        run: |
          if [ "$BUILD_TOOL" = "maven" ]; then
            snyk test \
              --file="$SERVICE_NAME/pom.xml" \
              --severity-threshold=high \
              --sarif-file-output=snyk-sca.sarif
          else
            snyk test \
              --file="$SERVICE_NAME/package.json" \
              --severity-threshold=high \
              --sarif-file-output=snyk-sca.sarif
          fi

      # ── Upload SARIF → GitHub Security tab ───────────────────────────────
      - name: Upload Snyk Open Source results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-sca.sarif
          category: snyk-sca-${{ inputs.service-name }}


