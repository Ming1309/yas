name: search service ci

on:
  push:
    branches: ["**"]
    tags:
      - "v*"
    paths:
      - "search/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/search-ci.yaml"
      - "pom.xml"

  pull_request:
    branches: ["**"]
    paths:
      - "search/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/search-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  # ============================================================================
  # PHASE 1: TEST - Run unit tests, code quality checks, security analysis
  # ============================================================================
  Test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK environment
        uses: ./.github/workflows/actions

      - name: Install dependencies (skip common-library tests)
        run: mvn install -pl search -am -DskipTests -Djacoco.skip=true --batch-mode --no-transfer-progress

      - name: Run Maven Tests
        run: mvn test -f search --batch-mode --no-transfer-progress
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -f search -Dcheckstyle.output.file=search-checkstyle-result.xml --batch-mode --no-transfer-progress
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "**/search-checkstyle-result.xml"
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) && hashFiles('search/**/target/surefire-reports/TEST-*.xml', 'search/**/target/failsafe-reports/TEST-*.xml') != '' }}
        with:
          name: Search-Service-Unit-Test-Results
          path: "search/**/*-reports/TEST*.xml"
          reporter: java-junit

      - name: Upload JUnit Test Results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: search-junit-test-results
          path: |
            search/**/target/surefire-reports/TEST-*.xml
            search/**/target/failsafe-reports/TEST-*.xml
          if-no-files-found: warn
          retention-days: 14
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f search --batch-mode --no-transfer-progress
      - name: OWASP Dependency Check
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: "yas"
          path: "."
          format: "HTML"
          args: --disableCentral
      - name: Upload OWASP Dependency Check results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports
          if-no-files-found: warn
          retention-days: 14
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' && hashFiles('search/target/site/jacoco/jacoco.xml') != '' }}
        with:
          paths: ${{github.workspace}}/search/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: "Search Coverage Report"
          update-comment: true

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: search-jacoco-coverage-report
          path: |
            search/target/site/jacoco/jacoco.xml
            search/target/site/jacoco-it/jacoco.xml
            search/target/site/jacoco/index.html
            search/target/site/jacoco-it/index.html
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce JaCoCo Coverage Threshold
        run: mvn jacoco:check@check -f search --batch-mode --no-transfer-progress

  # ============================================================================
  # PHASE 2: BUILD - Build Docker image and push to registry
  # ============================================================================
  Build:
    needs: Test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK environment
        uses: ./.github/workflows/actions

      - name: Build application (generate /target)
        run: mvn clean package -pl search -am -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/mingpham/yas-search
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: ./search
          push: true
          tags: ${{ steps.meta.outputs.tags }} 
          labels: ${{ steps.meta.outputs.labels }}
