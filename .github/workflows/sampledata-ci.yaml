name: sampledata service ci

on:
  push:
    branches: ["main"]
    paths:
      - "sampledata/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/sampledata-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "sampledata/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/sampledata-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  # ============================================================================
  # PHASE 1: TEST - Run unit tests, code quality checks, security analysis
  # ============================================================================
  Test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup JDK environment
        uses: ./.github/workflows/actions
      
      - name: Run Maven Tests and Build
        run: mvn clean install -pl sampledata -am
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl sampledata -am -Dcheckstyle.output.file=sampledata-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/sampledata-checkstyle-result.xml'

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) && hashFiles('sampledata/**/target/surefire-reports/TEST-*.xml', 'sampledata/**/target/failsafe-reports/TEST-*.xml') != '' }}
        with:
          name: Sampledata-Service-Test-Results
          path: "sampledata/**/*-reports/TEST*.xml"
          reporter: java-junit

      - name: Upload JUnit Test Results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: sampledata-junit-test-results
          path: |
            sampledata/**/target/surefire-reports/TEST-*.xml
            sampledata/**/target/failsafe-reports/TEST-*.xml
          if-no-files-found: warn
          retention-days: 14
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f sampledata
      - name: OWASP Dependency Check
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: 'yas'
          path: '.'
          format: 'HTML'
          args: --disableCentral
      - name: Upload OWASP Dependency Check results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports
          if-no-files-found: warn
          retention-days: 14

      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' && hashFiles('sampledata/target/site/jacoco/jacoco.xml') != '' }}
        with:
          paths: ${{github.workspace}}/sampledata/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: 'Sampledata Coverage Report'
          update-comment: true

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: sampledata-jacoco-coverage-report
          path: |
            sampledata/target/site/jacoco/jacoco.xml
            sampledata/target/site/jacoco-it/jacoco.xml
            sampledata/target/site/jacoco/index.html
            sampledata/target/site/jacoco-it/index.html
          if-no-files-found: warn
          retention-days: 14

  # ============================================================================
  # PHASE 2: BUILD - Build Docker image and push to registry
  # ============================================================================
  Build:
    needs: Test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: ./sampledata
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/yas-sampledata:latest