name: CI - Media Service

# Cấu hình Monorepo: Chỉ chạy pipeline khi có code thay đổi trong thư mục media-service/
on:
  push:
    branches: [ "main" ]
    paths:
      - 'media-service/**' 
  pull_request:
    branches: [ "main" ]
    paths:
      - 'media-service/**'

jobs:
  build-and-test:
    # ĐÂY CHÍNH LÀ BƯỚC CẤU HÌNH GITHUB-HOSTED RUNNER CỦA BẠN
    runs-on: ubuntu-latest 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup sẵn môi trường Java 21 cho YAS project
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # Giúp tăng tốc độ build cho các lần sau

      # -------------------------------------------------------------
      # Khu vực dành cho task của Như (Build) và Phát (Test) sau này
      # -------------------------------------------------------------
      - name: Build and Test placeholder
        run: echo "Chạy mvn clean install và jacoco test report ở đây"

      # -------------------------------------------------------------
      # Tích hợp Secrets & Env của bạn vào các bước kiểm tra bảo mật
      # -------------------------------------------------------------
      - name: Run Snyk Security Scan
        uses: snyk/actions/maven@master
        continue-on-error: true # Tạm thời cho phép lỗi để không block pipeline
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Token mặc định của GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}