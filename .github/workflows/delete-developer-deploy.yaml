name: delete_developer_deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type reset to reset yas-developer image tags to main"
        required: true
        default: "no"

permissions:
  contents: write

concurrency:
  group: developer-build
  cancel-in-progress: false

jobs:
  reset-developer-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        if: ${{ inputs.confirm != 'reset' }}
        run: |
          echo "Type 'reset' in the confirm input to reset developer deployment to main."
          exit 1

      - name: Checkout GitOps branch
        uses: actions/checkout@v4
        with:
          ref: gitops-developer
          fetch-depth: 0

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Synchronize with latest developer GitOps branch
        run: git pull --rebase origin gitops-developer

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML dependency
        run: python -m pip install pyyaml

      - name: Reset developer image tags to main
        run: >
          python .github/scripts/gitops_update_images.py developer
          --all
          --tag main

      - name: Commit developer reset request
        shell: bash
        run: |
          git add k8s/environments/developer
          if git diff --cached --quiet; then
            echo "No developer reset changes to commit."
            exit 0
          fi
          git commit -m "gitops: reset developer deployment to main [skip ci]"
          git push origin HEAD:gitops-developer
