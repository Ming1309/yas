name: media service ci

# ============================================================================
# WORKFLOW: Media Service CI/CD Pipeline
# ============================================================================
# This workflow builds, tests, and deploys the Media Service.
#
# TESTING STRATEGY:
# - Unit Tests: MediaServiceUnitTest.java, MediaControllerTest.java
#   Coverage: Tests for all major operations (save, get, delete, file ops)
# - Integration Tests: MediaControllerIT.java
#   Coverage: Full HTTP request/response validation
# - Code Quality: SonarCloud analysis with 70% minimum coverage requirement
# - Security: OWASP Dependency Check for vulnerabilities
#
# COVERAGE REQUIREMENTS:
# - Minimum overall coverage: 70%
# - Minimum coverage for changed files (PR): 70%
# - JaCoCo reports generated and compared against thresholds
#
# PHASES:
# 1. TEST: Run all tests, quality checks, and security scans
# 2. BUILD: Create and push Docker image (main branch only)
# ============================================================================

on:
  push:
    branches: ["**"]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["**"]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  # ============================================================================
  # PHASE 1: TEST - Run unit tests, code quality checks, security analysis
  # ============================================================================
  Test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK environment
        uses: ./.github/workflows/actions

      - name: Run Maven Tests and Build
        run: mvn clean install -pl media -am

      - name: Verify Test Coverage Threshold
        run: |
          echo "Testing Media Service Unit Tests..."
          mvn test -pl media -am -Dtest='*UnitTest,*Test' -X

      - name: Run Integration Tests
        run: mvn verify -pl media -am -DskipUnitTests=false
        continue-on-error: false

      - name: Generate Test Report Summary
        if: always()
        run: |
          echo "## Media Service Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Unit Tests" >> $GITHUB_STEP_SUMMARY
          if [ -f "media/target/surefire-reports/TEST-*.xml" ]; then
            echo "✅ Unit tests completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No unit test reports found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage Metrics" >> $GITHUB_STEP_SUMMARY
          echo "📊 Minimum required: 70%" >> $GITHUB_STEP_SUMMARY

      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl media -am -Dcheckstyle.output.file=media-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "**/media-checkstyle-result.xml"
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) && hashFiles('media/**/target/surefire-reports/TEST-*.xml', 'media/**/target/failsafe-reports/TEST-*.xml') != '' }}
        with:
          name: Media-Service-Unit-Test-Results
          path: "media/**/*-reports/TEST*.xml"
          reporter: java-junit

      - name: Upload JUnit Test Results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: media-junit-test-results
          path: |
            media/**/target/surefire-reports/TEST-*.xml
            media/**/target/failsafe-reports/TEST-*.xml
          if-no-files-found: warn
          retention-days: 14
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f media -Dsonar.coverage.jacoco.xmlReportPaths=media/target/site/jacoco/jacoco.xml

      - name: Validate Test Coverage
        if: ${{ always() && hashFiles('media/target/site/jacoco/jacoco.xml') != '' }}
        run: |
          echo "Test Coverage Report Generated"
          echo "Location: media/target/site/jacoco/index.html"

      - name: OWASP Dependency Check
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: "yas"
          path: "."
          format: "HTML"
          args: --disableCentral
      - name: Upload OWASP Dependency Check results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports
          if-no-files-found: warn
          retention-days: 14
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' && hashFiles('media/target/site/jacoco/jacoco.xml') != '' }}
        with:
          paths: ${{github.workspace}}/media/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: "Media Coverage Report"
          update-comment: true

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: media-jacoco-coverage-report
          path: |
            media/target/site/jacoco/jacoco.xml
            media/target/site/jacoco-it/jacoco.xml
            media/target/site/jacoco/index.html
            media/target/site/jacoco-it/index.html
          if-no-files-found: warn
          retention-days: 14

  # ============================================================================
  # PHASE 2: BUILD - Build Docker image and push to registry
  # ============================================================================
  Build:
    needs: Test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK environment
        uses: ./.github/workflows/actions

      - name: Build application (generate /target)
        run: mvn clean package -pl media -am -DskipTests

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: ./media
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/yas-media:latest
