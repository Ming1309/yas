apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: product-allow-rules
  namespace: yas-dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/yas-dev/sa/storefront-bff"
        - "cluster.local/ns/yas-dev/sa/order"
        - "cluster.local/ns/yas-dev/sa/search"
        - "cluster.local/ns/yas-dev/sa/inventory"
---
