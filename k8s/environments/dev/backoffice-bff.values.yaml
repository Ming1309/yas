backend:
  image:
    repository: docker.io/mingpham/yas-backoffice-bff
    tag: main

  service:
    type: NodePort
    nodePort: 30087

  ingress:
    enabled: false

  serviceMonitor:
    enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 700m
      memory: 768Mi
