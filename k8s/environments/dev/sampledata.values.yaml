backend:
  image:
    repository: docker.io/mingpham/yas-sampledata
    tag: main

  replicaCount: 0

  service:
    type: ClusterIP

  serviceMonitor:
    enabled: true
    path: /sampledata/actuator/prometheus

  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 700m
      memory: 768Mi
