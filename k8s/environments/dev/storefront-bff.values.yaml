backend:
  image:
    repository: docker.io/mingpham/yas-storefront-bff
    tag: d11f41e
  service:
    type: NodePort
    nodePort: 30081
  ingress:
    enabled: true
    className: nginx
    host: api.yas.local.com
    path: /api
    pathType: Prefix
  serviceMonitor:
    enabled: true
  opentelemetry:
    enabled: true
    serviceName: storefront-bff
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 700m
      memory: 768Mi
