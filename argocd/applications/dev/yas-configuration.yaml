apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-yas-configuration
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/Ming1309/yas.git
    targetRevision: main
    path: k8s/charts/yas-configuration
    helm:
      valueFiles:
        - ../../environments/dev/yas-configuration.values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
