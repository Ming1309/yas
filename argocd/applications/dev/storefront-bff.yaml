apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-storefront-bff
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ming1309/yas.git
    targetRevision: main
    path: k8s/charts/storefront-bff
    helm:
      valueFiles:
        - ../../environments/dev/storefront-bff.values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
