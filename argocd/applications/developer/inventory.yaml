apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-developer-inventory
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ming1309/yas.git
    targetRevision: main
    path: k8s/charts/inventory
    helm:
      valueFiles:
        - ../../environments/developer/inventory.values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-developer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
