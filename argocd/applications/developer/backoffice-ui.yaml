apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-developer-backoffice-ui
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Ming1309/yas.git
    targetRevision: main
    path: k8s/charts/backoffice-ui
    helm:
      valueFiles:
        - ../../environments/developer/backoffice-ui.values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-developer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
